---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: web
spec:
  serviceName: "nginx"
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - image: registry.k8s.io/nginx-slim:0.8
          name: nginx
          ports:
            - containerPort: 80
              name: web
          resources: {}
          volumeMounts:
            - mountPath: /usr/share/nginx/html
              name: www
      runtimeClassName: foo
  updateStrategy: {}
  volumeClaimTemplates:
    - metadata:
        name: www
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
      status: {}
status:
  availableReplicas: 0
  replicas: 0
