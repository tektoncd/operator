# Dependabot configuration
# This file defines the base configuration and branches for dependabot updates.
# The actual .github/dependabot.yml is generated from this file.
#
# Automated regeneration:
# - A GitHub Actions workflow runs weekly to regenerate dependabot.yml
# - If changes are detected, it automatically creates a PR
# - See: .github/workflows/dependabot-regen.yml
#
# Manual regeneration:
# 1. Edit the 'ecosystems' section to change what packages to monitor
# 2. Edit the 'release-branches' section to add/remove active release branches
# 3. Run: ./hack/generate-dependabot.sh

# Active release branches to monitor (in addition to main).
# Release branches receive patch-only updates (no major/minor bumps).
# Check releases.md for the current list of supported releases.
release-branches:
  - release-v0.80.x
  - release-v0.79.x
  - release-v0.78.x
  - release-v0.77.x
  - release-v0.76.x
  - release-v0.75.x
# Package ecosystems to monitor.
# Each ecosystem will be configured for:
# - main branch: all updates (subject to ignore rules below)
# - release branches: patch updates only (major/minor blocked via extra ignore rule)
ecosystems:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - ok-to-test
      - dependencies
      - github_action
      - kind/misc
      - release-note-none
    groups:
      # Collapse all GitHub Actions bumps into a single weekly PR per branch.
      # These are low-risk version bumps and were previously opened one PR per
      # action, flooding the queue (especially on release branches).
      github-actions:
        patterns:
          - "*"
    cooldown:
      default-days: 7
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    labels:
      - ok-to-test
      - dependencies
      - kind/misc
      - release-note-none
    ignore:
      - dependency-name: "k8s.io/*"
        update-types:
          - version-update:semver-major
          - version-update:semver-minor
      - dependency-name: "github.com/openshift/client-go"
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
