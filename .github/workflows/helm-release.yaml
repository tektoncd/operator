name: Release Charts

on:  # yamllint disable-line rule:truthy
  push:
    tags: ["v*"]

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    if: github.repository_owner == 'tektoncd'  # do not run this elsewhere
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Git
        run: |
          git config user.name "tekton-robot"
          git config user.email "dlorenc+tekton@google.com"

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5.0.0
        with:
          version: v3.8.1

      - name: Update Chart version with release tag
        run: |
          # Extract tag name, stripping leading 'v' (e.g. v0.79.0 -> 0.79.0)
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          sed -i "s/^version: \"devel\"/version: \"${VERSION}\"/" charts/tekton-operator/Chart.yaml
          sed -i "s/^appVersion: \"devel\"/appVersion: \"${VERSION}\"/" charts/tekton-operator/Chart.yaml
          echo "Updated Chart.yaml to version ${VERSION}"

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f  # v1.7.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
