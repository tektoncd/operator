name: Release Charts

on:  # yamllint disable-line rule:truthy
  push:
    tags: ["v*"]

jobs:
  release:
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest
    if: github.repository_owner == 'tektoncd'  # do not run this elsewhere
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Git
        run: |
          git config user.name "tekton-robot"
          git config user.email "dlorenc+tekton@google.com"

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310  # v5.0.1
        with:
          version: v3.8.1

      - name: Update Chart version with release tag
        run: |
          # Extract tag name (e.g. v0.80.0) and chart version without leading 'v' (e.g. 0.80.0).
          # chart 'version' follows plain semver (no 'v' prefix).
          # chart 'appVersion' must match the container image tag which carries the 'v' prefix.
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          sed -i "s/^version: \"devel\"/version: \"${VERSION}\"/" charts/tekton-operator/Chart.yaml
          sed -i "s/^appVersion: \"devel\"/appVersion: \"${TAG}\"/" charts/tekton-operator/Chart.yaml
          echo "Updated Chart.yaml: chart version=${VERSION}, appVersion=${TAG}"
          echo "CHART_VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f  # v1.7.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push chart to OCI registry
        run: |
          helm package charts/tekton-operator \
            --version "${CHART_VERSION}" \
            --destination /tmp/
          helm push "/tmp/tekton-operator-${CHART_VERSION}.tgz" \
            oci://ghcr.io/tektoncd/operator/charts
          echo "Pushed ghcr.io/tektoncd/operator/charts/tekton-operator:${CHART_VERSION}"
