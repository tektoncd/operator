name: Release Charts

on:  # yamllint disable-line rule:truthy
  push:
    tags: ["v*"]

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    if: github.repository_owner == 'tektoncd'  # do not run this elsewhere
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "tekton-robot"
          git config user.email "dlorenc+tekton@google.com"

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4  # v4.3.1
        with:
          version: v3.8.1

      - name: Update Chart version with release tag
        run: |
          # Extract tag name, stripping leading 'v' (e.g. v0.79.0 -> 0.79.0)
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          sed -i "s/^version: \"devel\"/version: \"${VERSION}\"/" charts/tekton-operator/Chart.yaml
          sed -i "s/^appVersion: \"devel\"/appVersion: \"${VERSION}\"/" charts/tekton-operator/Chart.yaml
          echo "Updated Chart.yaml to version ${VERSION}"

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f  # v1.7.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
