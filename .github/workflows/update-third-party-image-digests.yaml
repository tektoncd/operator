name: Update third-party image digests

on:  # yamllint disable-line rule:truthy
  workflow_dispatch: {}
  schedule:
  # Run every Wednesday at 3AM UTC
  - cron: '0 3 * * 3'

permissions: {}

jobs:
  build-branch-matrix:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.repository_owner == 'tektoncd'  # do not run this elsewhere
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      with:
        persist-credentials: false
        sparse-checkout: .github/dependabot.config.yml
    - id: set-matrix
      run: |
        BRANCHES=$(python3 -c "
        import yaml, json
        with open('.github/dependabot.config.yml') as f:
            data = yaml.safe_load(f)
        print(json.dumps(data['release-branches'] + ['main']))
        ")
        echo "Branches: ${BRANCHES}"
        echo "branches=${BRANCHES}" >> "$GITHUB_OUTPUT"
    outputs:
      branches: ${{ steps.set-matrix.outputs.branches }}

  update-images:
    needs: build-branch-matrix
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    strategy:
      matrix:
        branch: ${{ fromJSON(needs.build-branch-matrix.outputs.branches) }}
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      with:
        ref: ${{ matrix.branch }}
        persist-credentials: false
    - name: configure registry authentication
      env:
        DOCKER_CONFIG: /home/runner/.docker
        DOCKER_JSON: ${{ secrets.REDHAT_REGISTRY_TOKEN }}
      run: |
        mkdir -p "${DOCKER_CONFIG}"
        umask 077
        printf '%s' "${DOCKER_JSON}" > "${DOCKER_CONFIG}/config.json"
    - name: install skopeo
      run: |
        if ! command -v skopeo &>/dev/null; then
          sudo apt-get update && sudo apt-get install -y skopeo
        fi
    - name: fetch script from main
      env:
        GH_REPO: ${{ github.repository }}
      run: |
        curl -sSfL "https://raw.githubusercontent.com/${GH_REPO}/main/hack/openshift/update-image-sha.sh" \
          -o hack/openshift/update-image-sha.sh
        chmod +x hack/openshift/update-image-sha.sh
    - name: update image digests
      run: |
        hack/openshift/update-image-sha.sh
    - name: check for changes
      id: check-changes
      env:
        BRANCH: ${{ matrix.branch }}
      run: |
        if git diff --quiet; then
          echo "No image digest changes detected on ${BRANCH}"
          echo "has_changes=false" >> "$GITHUB_OUTPUT"
        else
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
        fi
    - name: generate PR body
      if: steps.check-changes.outputs.has_changes == 'true'
      id: generate-body
      env:
        BRANCH: ${{ matrix.branch }}
      run: |
        DIFF_SNIPPET=$(git diff -- operatorhub/openshift/config.yaml \
          | grep -E '^[-+].*@sha256:' | head -30 || true)

        echo "pr_body<<EOF" >> "$GITHUB_OUTPUT"
        cat >> "$GITHUB_OUTPUT" <<INNEREOF
        ## Summary

        Automated update of third-party base image digests to their latest versions
        from \`registry.redhat.io\` on branch \`${BRANCH}\`.

        This helps ensure images are current and include the latest CVE fixes.

        ### Files updated
        - \`operatorhub/openshift/config.yaml\`
        - \`config/openshift/base/operator.yaml\`
        - \`operatorhub/openshift/release-artifacts/bundle/manifests/*.yaml\`
        - \`cmd/openshift/operator/kodata/tekton-addon/addons/**/*.yaml\`

        ### Changed digests
        \`\`\`diff
        ${DIFF_SNIPPET}
        \`\`\`

        > This PR was auto-generated by the **update-third-party-image-digests** workflow.
        INNEREOF
        echo "EOF" >> "$GITHUB_OUTPUT"
    - name: create pull request
      if: steps.check-changes.outputs.has_changes == 'true'
      uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
      with:
        token: ${{ secrets.CHATOPS_TOKEN }}
        commit-message: "chore: update third-party image digests"
        committer: tekton-bot <tekton-bot@users.noreply.github.com>
        author: Divyanshu Agrawal <diagrawa@redhat.com>
        signoff: true
        # author: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
        branch: bot-update-third-party-images-${{ matrix.branch }}
        delete-branch: true
        title: "chore: update third-party image digests (${{ matrix.branch }})"
        body: ${{ steps.generate-body.outputs.pr_body }}
        labels: |
          release-note-none
