apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: tektonhubs.operator.tekton.dev
  labels:
    version: "devel"
    operator.tekton.dev/release: "devel"
spec:
  group: operator.tekton.dev
  names:
    kind: TektonHub
    listKind: TektonHubList
    plural: tektonhubs
    singular: tektonhub
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.version
      name: Version
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].message
      name: Reason
      type: string
    - jsonPath: .status.apiUrl
      name: ApiUrl
      type: string
    - jsonPath: .status.uiUrl
      name: UiUrl
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: TektonHub is the Schema for the tektonhub API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              api:
                properties:
                  catalogRefreshInterval:
                    type: string
                  hubConfigUrl:
                    description: Deprecated, will be removed in further release
                    type: string
                  routeHostUrl:
                    type: string
                  secret:
                    type: string
                type: object
              catalogs:
                items:
                  properties:
                    contextDir:
                      type: string
                    name:
                      type: string
                    org:
                      type: string
                    provider:
                      type: string
                    revision:
                      type: string
                    sshUrl:
                      type: string
                    type:
                      type: string
                    url:
                      type: string
                  type: object
                type: array
              categories:
                items:
                  type: string
                type: array
              customLogo:
                description: The Base64 Encode data and mediaType of the Custom Logo
                properties:
                  base64Data:
                    type: string
                  mediaType:
                    type: string
                type: object
              db:
                properties:
                  secret:
                    type: string
                type: object
              default:
                properties:
                  scopes:
                    items:
                      type: string
                    type: array
                type: object
              options:
                description: options holds additions fields and these fields will
                  be updated on the manifests
                properties:
                  configMaps:
                    x-kubernetes-preserve-unknown-fields: true
                  deployments:
                    x-kubernetes-preserve-unknown-fields: true
                  disabled:
                    type: boolean
                  horizontalPodAutoscalers:
                    x-kubernetes-preserve-unknown-fields: true
                  statefulSets:
                    x-kubernetes-preserve-unknown-fields: true
                  webhookConfigurationOptions:
                    additionalProperties:
                      description: WebhookOptions defines options for webhooks
                      properties:
                        failurePolicy:
                          description: FailurePolicyType specifies a failure policy
                            that defines how unrecognized errors from the admission
                            endpoint are handled.
                          type: string
                        sideEffects:
                          description: SideEffectClass specifies the types of side
                            effects a webhook may have.
                          type: string
                        timeoutSeconds:
                          format: int32
                          type: integer
                      type: object
                    type: object
                type: object
              params:
                description: Params is the list of params passed for Hub customization
                items:
                  description: Param declares an string value to use for the parameter
                    called name.
                  properties:
                    name:
                      type: string
                    value:
                      type: string
                  type: object
                type: array
              scopes:
                items:
                  properties:
                    name:
                      type: string
                    users:
                      items:
                        type: string
                      type: array
                  type: object
                type: array
              targetNamespace:
                description: TargetNamespace is where resources will be installed
                type: string
            required:
            - options
            type: object
          status:
            description: TektonHubStatus defines the observed state of TektonHub
            properties:
              annotations:
                additionalProperties:
                  type: string
                description: |-
                  Annotations is additional Status fields for the Resource to save some
                  additional State as well as convey more information to the user. This is
                  roughly akin to Annotations on any k8s resource, just the reconciler conveying
                  richer information outwards.
                type: object
              apiUrl:
                description: The URL route for API which needs to be exposed
                type: string
              authUrl:
                description: The URL route for Auth server
                type: string
              conditions:
                description: Conditions the latest available observations of a resource's
                  current state.
                items:
                  description: |-
                    Condition defines a readiness condition for a Knative resource.
                    See: https://github.com/kubernetes/community/blob/master/contributors/devel/sig-architecture/api-conventions.md#typical-status-properties
                  properties:
                    lastTransitionTime:
                      description: |-
                        LastTransitionTime is the last time the condition transitioned from one status to another.
                        We use VolatileTime in place of metav1.Time to exclude this from creating equality.Semantic
                        differences (all other things held constant).
                      type: string
                    message:
                      description: A human readable message indicating details about
                        the transition.
                      type: string
                    reason:
                      description: The reason for the condition's last transition.
                      type: string
                    severity:
                      description: |-
                        Severity with which to treat failures of this type of condition.
                        When this is not specified, it defaults to Error.
                      type: string
                    status:
                      description: Status of the condition, one of True, False, Unknown.
                      type: string
                    type:
                      description: Type of condition.
                      type: string
                  required:
                  - status
                  - type
                  type: object
                type: array
              hubInstallerSets:
                additionalProperties:
                  type: string
                description: The current installer set name
                type: object
              manifests:
                description: The url links of the manifests, separated by comma
                items:
                  type: string
                type: array
              observedGeneration:
                description: |-
                  ObservedGeneration is the 'Generation' of the Service that
                  was last processed by the controller.
                format: int64
                type: integer
              uiUrl:
                description: The URL route for UI which needs to be exposed
                type: string
              version:
                description: The version of the installed release
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
