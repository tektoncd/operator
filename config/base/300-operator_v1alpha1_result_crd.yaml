apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: tektonresults.operator.tekton.dev
  labels:
    version: "devel"
    operator.tekton.dev/release: "devel"
spec:
  group: operator.tekton.dev
  names:
    kind: TektonResult
    listKind: TektonResultList
    plural: tektonresults
    singular: tektonresult
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.version
      name: Version
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].message
      name: Reason
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: TektonResult is the Schema for the tektonresults API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: TektonResultSpec defines the desired state of TektonResult
            properties:
              auth_disable:
                type: boolean
              auth_impersonate:
                type: boolean
              config:
                description: Config holds the configuration for resources created
                  by TektonResult
                properties:
                  nodeSelector:
                    additionalProperties:
                      type: string
                    type: object
                  priorityClassName:
                    description: PriorityClassName holds the priority class to be
                      set to pod template
                    type: string
                  tolerations:
                    items:
                      description: |-
                        The pod this Toleration is attached to tolerates any taint that matches
                        the triple <key,value,effect> using the matching operator <operator>.
                      properties:
                        effect:
                          description: |-
                            Effect indicates the taint effect to match. Empty means match all taint effects.
                            When specified, allowed values are NoSchedule, PreferNoSchedule and NoExecute.
                          type: string
                        key:
                          description: |-
                            Key is the taint key that the toleration applies to. Empty means match all taint keys.
                            If the key is empty, operator must be Exists; this combination means to match all values and all keys.
                          type: string
                        operator:
                          description: |-
                            Operator represents a key's relationship to the value.
                            Valid operators are Exists, Equal, Lt, and Gt. Defaults to Equal.
                            Exists is equivalent to wildcard for value, so that a pod can
                            tolerate all taints of a particular category.
                            Lt and Gt perform numeric comparisons (requires feature gate TaintTolerationComparisonOperators).
                          type: string
                        tolerationSeconds:
                          description: |-
                            TolerationSeconds represents the period of time the toleration (which must be
                            of effect NoExecute, otherwise this field is ignored) tolerates the taint. By default,
                            it is not set, which means tolerate the taint forever (do not evict). Zero and
                            negative values will be treated as 0 (evict immediately) by the system.
                          format: int64
                          type: integer
                        value:
                          description: |-
                            Value is the taint value the toleration matches to.
                            If the operator is Exists, the value should be empty, otherwise just a regular string.
                          type: string
                      type: object
                    type: array
                type: object
              db_enable_auto_migration:
                type: boolean
              db_host:
                type: string
              db_name:
                type: string
              db_port:
                format: int64
                type: integer
              db_secret_name:
                type: string
              db_secret_password_key:
                type: string
              db_secret_user_key:
                type: string
              db_sslmode:
                type: string
              db_sslrootcert:
                type: string
              disabled:
                description: enable or disable Result Component
                type: boolean
              gcs_bucket_name:
                type: string
              gcs_creds_secret_key:
                type: string
              gcs_creds_secret_name:
                type: string
              is_external_db:
                type: boolean
              log_level:
                type: string
              logging_plugin_api_url:
                type: string
              logging_plugin_ca_cert:
                type: string
              logging_plugin_forwarder_delay_duration:
                type: integer
              logging_plugin_multipart_regex:
                type: string
              logging_plugin_namespace_key:
                type: string
              logging_plugin_proxy_path:
                type: string
              logging_plugin_query_limit:
                type: integer
              logging_plugin_query_params:
                type: string
              logging_plugin_static_labels:
                type: string
              logging_plugin_tls_verification_disable:
                type: boolean
              logging_plugin_token_path:
                type: string
              logging_pvc_name:
                type: string
              logs_api:
                type: boolean
              logs_buffer_size:
                format: int64
                type: integer
              logs_path:
                type: string
              logs_type:
                type: string
              loki_stack_name:
                type: string
              loki_stack_namespace:
                type: string
              options:
                description: Options holds additions fields and these fields will
                  be updated on the manifests
                properties:
                  configMaps:
                    x-kubernetes-preserve-unknown-fields: true
                  deployments:
                    x-kubernetes-preserve-unknown-fields: true
                  disabled:
                    type: boolean
                  horizontalPodAutoscalers:
                    x-kubernetes-preserve-unknown-fields: true
                  statefulSets:
                    x-kubernetes-preserve-unknown-fields: true
                  webhookConfigurationOptions:
                    additionalProperties:
                      description: WebhookOptions defines options for webhooks
                      properties:
                        failurePolicy:
                          description: FailurePolicyType specifies a failure policy
                            that defines how unrecognized errors from the admission
                            endpoint are handled.
                          type: string
                        sideEffects:
                          description: SideEffectClass specifies the types of side
                            effects a webhook may have.
                          type: string
                        timeoutSeconds:
                          format: int32
                          type: integer
                      type: object
                    type: object
                type: object
              performance:
                description: |-
                  PerformanceProperties defines the fields which are configurable
                  to tune the performance of component controller
                properties:
                  buckets:
                    type: integer
                  disable-ha:
                    description: if it is true, disables the HA feature
                    type: boolean
                  kube-api-burst:
                    type: integer
                  kube-api-qps:
                    description: |-
                      queries per second (QPS) and burst to the master from rest API client
                      actually the number multiplied by 2
                      https://github.com/pierretasci/pipeline/blob/05d67e427c722a2a57e58328d7097e21429b7524/cmd/controller/main.go#L85-L87
                      defaults: https://github.com/tektoncd/pipeline/blob/34618964300620dca44d10a595e4af84e9903a55/vendor/k8s.io/client-go/rest/config.go#L45-L46
                    type: number
                  replicas:
                    format: int32
                    type: integer
                  statefulset-ordinals:
                    description: if is true, enable StatefulsetOrdinals mode
                    type: boolean
                  threads-per-controller:
                    description: The number of workers to use when processing the
                      component controller's work queue
                    type: integer
                required:
                - disable-ha
                type: object
              prometheus_histogram:
                type: boolean
              prometheus_port:
                format: int64
                type: integer
              route_enabled:
                description: Route configuration for Results API service exposure
                type: boolean
              route_host:
                type: string
              route_path:
                type: string
              route_tls_termination:
                type: string
              secret_name:
                description: |-
                  name of the secret used to get S3 credentials and
                  pass it as environment variables to the "tekton-results-api" deployment under "api" container
                type: string
              server_port:
                format: int64
                type: integer
              storage_emulator_host:
                type: string
              targetNamespace:
                description: TargetNamespace is where resources will be installed
                type: string
              tls_hostname_override:
                type: string
            required:
            - disabled
            - is_external_db
            - options
            type: object
          status:
            description: TektonResultStatus defines the observed state of TektonResult
            properties:
              annotations:
                additionalProperties:
                  type: string
                description: |-
                  Annotations is additional Status fields for the Resource to save some
                  additional State as well as convey more information to the user. This is
                  roughly akin to Annotations on any k8s resource, just the reconciler conveying
                  richer information outwards.
                type: object
              conditions:
                description: Conditions the latest available observations of a resource's
                  current state.
                items:
                  description: |-
                    Condition defines a readiness condition for a Knative resource.
                    See: https://github.com/kubernetes/community/blob/master/contributors/devel/sig-architecture/api-conventions.md#typical-status-properties
                  properties:
                    lastTransitionTime:
                      description: |-
                        LastTransitionTime is the last time the condition transitioned from one status to another.
                        We use VolatileTime in place of metav1.Time to exclude this from creating equality.Semantic
                        differences (all other things held constant).
                      type: string
                    message:
                      description: A human readable message indicating details about
                        the transition.
                      type: string
                    reason:
                      description: The reason for the condition's last transition.
                      type: string
                    severity:
                      description: |-
                        Severity with which to treat failures of this type of condition.
                        When this is not specified, it defaults to Error.
                      type: string
                    status:
                      description: Status of the condition, one of True, False, Unknown.
                      type: string
                    type:
                      description: Type of condition.
                      type: string
                  required:
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                description: |-
                  ObservedGeneration is the 'Generation' of the Service that
                  was last processed by the controller.
                format: int64
                type: integer
              tektonInstallerSet:
                description: The current installer set name for TektonResult
                type: string
              version:
                description: The version of the installed release
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
