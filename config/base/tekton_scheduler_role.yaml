apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tekton-scheduler-role
rules:
  - apiGroups:
      - kueue.x-k8s.io
    resources:
      - resourceflavors
      - workloadpriorityclasses
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - kueue.x-k8s.io
    resources:
      - workloadpriorityclasses
    verbs:
      - create
  - apiGroups:
      - kueue.x-k8s.io
    resources:
      - workloads
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - kueue.x-k8s.io
    resources:
      - workloads/finalizers
    verbs:
      - update
  - apiGroups:
      - kueue.x-k8s.io
    resources:
      - workloads/status
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - scheduling.k8s.io
    resources:
      - priorityclasses
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - cert-manager.io
    resources:
      - certificates
      - issuers
    verbs:
      - get
      - create
  - nonResourceURLs:
      - /metrics
    verbs:
      - get
