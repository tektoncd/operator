# This PipelineRun is triggered via PAC incoming webhooks for patch
# releases on existing release branches. It is invoked either manually
# (via GitHub Actions workflow_dispatch) or on a cron schedule when
# new commits are detected on a release branch since the last tag.
#
# The version and release_as_latest parameters are passed dynamically
# through the incoming webhook payload.
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: release-patch
  annotations:
    pipelinesascode.tekton.dev/on-event: "[incoming]"
    pipelinesascode.tekton.dev/on-target-branch: "[release-v*]"
    pipelinesascode.tekton.dev/pipeline: "tekton/operator-release-pipeline.yaml"
    pipelinesascode.tekton.dev/max-keep-runs: "5"
spec:
  taskRunTemplate:
    serviceAccountName: release
  pipelineRef:
    name: operator-release
  params:
    - name: package
      value: github.com/tektoncd/operator
    - name: repoName
      value: operator
    - name: components
      value: components.yaml
    - name: gitRevision
      value: "{{ revision }}"
    - name: imageRegistry
      value: ghcr.io
    - name: imageRegistryPath
      value: tektoncd/operator
    - name: imageRegistryRegions
      value: ""
    - name: imageRegistryUser
      value: tekton-robot
    - name: versionTag
      value: "{{ version }}"
    - name: releaseBucket
      value: tekton-releases
    - name: releaseAsLatest
      value: "{{ release_as_latest }}"
    - name: koExtraArgs
      # Empty: use ko's default --base-import-paths (hash-based image names),
      # matching the canonical published image paths. Do NOT set
      # --preserve-import-paths: it pushes to ghcr.io/tektoncd/operator/github.com/...
      # long paths (private, non-canonical) and breaks the published manifests.
      value: ""
    - name: serviceAccountImagesPath
      value: credentials
    - name: runTests
      value: "true"
    - name: platforms
      value: linux/amd64,linux/arm64,linux/s390x,linux/ppc64le
    - name: kubeDistros
      value: "kubernetes openshift"
    # Auto-detected from git tags when empty
    - name: previousReleaseTag
      value: ""
    - name: releaseName
      value: ""
    # Publish patch releases directly instead of leaving an unpublished
    # draft behind: draft GitHub releases don't push a real git tag, so
    # leaving this at the pipeline's "true" default would silently skip
    # the tag push that triggers helm-release.yaml (and any other
    # tag-triggered workflows).
    - name: draft
      value: "false"
  timeouts:
    pipeline: 3h0m0s
  workspaces:
    - name: workarea
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 5Gi
    - name: release-secret
      secret:
        secretName: oci-release-secret
    - name: release-images-secret
      secret:
        secretName: ghcr-creds
    # Enables automatic draft GitHub release creation.
    - name: github-secret
      secret:
        secretName: github-token
